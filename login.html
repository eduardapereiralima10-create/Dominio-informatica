<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar ou cadastrar | Domínio Informática</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page-body">
  <main class="login-page">
    <div class="login-card">
      <a href="index.html" class="back-link">← Voltar para a loja</a>
      <img src="logo-dominio.png.png" alt="Domínio Informática" class="login-logo" />

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-auth-tab="register">Cadastro</button>
        <button type="button" class="auth-tab" data-auth-tab="login">Entrar</button>
      </div>

      <section class="auth-section active" id="registerSection">
        <h1>Crie sua conta</h1>
        <p>Cadastro com nome, e-mail, telefone, senha e endereço.</p>

        <form id="registerForm" class="login-form">
          <div class="form-grid-two">
            <input type="text" id="registerName" placeholder="Nome e sobrenome" required />
            <input type="email" id="registerEmail" placeholder="E-mail" required />
          </div>

          <div class="form-grid-two">
            <input type="tel" id="registerPhone" placeholder="Telefone" required />
            <input type="password" id="registerPassword" placeholder="Senha" required />
          </div>

          <input type="text" id="registerStreet" placeholder="Rua / Avenida" required />

          <div class="form-grid-two">
            <input type="text" id="registerNumber" placeholder="Número" required />
            <input type="text" id="registerNeighborhood" placeholder="Bairro" required />
          </div>

          <div class="form-grid-two">
            <input type="text" id="registerCity" placeholder="Cidade" required />
            <input type="text" id="registerState" placeholder="Estado" required />
          </div>

          <input type="text" id="registerReference" placeholder="Referência (opcional)" />

          <button type="submit" class="btn-primary full">Salvar cadastro</button>
        </form>
      </section>

      <section class="auth-section" id="loginSection">
        <h1>Entrar</h1>
        <p>Entre usando e-mail e senha.</p>

        <form id="loginForm" class="login-form">
          <input type="email" id="loginEmail" placeholder="E-mail" required />
          <input type="password" id="loginPassword" placeholder="Senha" required />
          <button type="submit" class="btn-primary full">Entrar</button>
        </form>
      </section>
    </div>
  </main>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
