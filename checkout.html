<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Domínio Informática</title>
 <link rel="stylesheet" href="estilo.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="container header-top-content">
        <div class="ship-to" id="shipToText">Enviar para Maria • Avenida das Nações</div>
      </div>
    </div>

    <div class="header-main">
      <div class="container header-main-content">
        <a href="index.html" class="logo-area">
          <img src="logo-dominio.png" alt="Domínio Informática" class="site-logo" />
        </a>

        <div class="checkout-header-actions">
          <a href="index.html" class="btn-secondary">Continuar comprando</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="checkout-layout">
      <section class="checkout-main">
        <div class="checkout-box">
          <h2>1. Seus dados</h2>
          <div id="checkoutUserData"></div>
        </div>

        <div class="checkout-box">
          <h2>2. Recebimento</h2>

          <div class="checkout-options">
            <label class="checkout-option selected">
              <input type="radio" name="deliveryType" value="retirada" checked />
              <strong>Retirada na loja</strong>
              <span>Buscar no local</span>
            </label>

            <label class="checkout-option">
              <input type="radio" name="deliveryType" value="entrega" />
              <strong>Entrega</strong>
              <span>Enviar no endereço</span>
            </label>
          </div>

          <div id="deliveryFields" class="hidden">
            <input type="text" id="checkoutStreet" placeholder="Rua / Avenida" />
            <div class="form-grid-two">
              <input type="text" id="checkoutNumber" placeholder="Número" />
              <input type="text" id="checkoutNeighborhood" placeholder="Bairro" />
            </div>
            <input type="text" id="checkoutReference" placeholder="Referência" />
            <input type="text" id="checkoutWorkplace" placeholder="Local de trabalho (opcional)" />
          </div>
        </div>

        <div class="checkout-box">
          <h2>3. Pagamento</h2>

          <div class="checkout-options">
            <label class="checkout-option selected">
              <input type="radio" name="paymentMethod" value="pix" checked />
              <strong>Pix</strong>
              <span>Pagamento instantâneo</span>
            </label>

            <label class="checkout-option">
              <input type="radio" name="paymentMethod" value="dinheiro" />
              <strong>Dinheiro</strong>
              <span>Na entrega ou retirada</span>
            </label>

            <label class="checkout-option">
              <input type="radio" name="paymentMethod" value="cartao" />
              <strong>Cartão</strong>
              <span>Parcelamento</span>
            </label>
          </div>

          <div id="pixBox" class="checkout-payment-box">
            <div class="pix-layout">
              <div class="pix-image-box">
                <img src="pix-qrcode.png" alt="QR Code Pix" />
              </div>

              <div class="pix-info">
                <p><strong>Chave Pix</strong></p>
                <div class="pix-copy-box">
                  <input type="text" id="pixKey" value="b476bb76-75e0-4b0d-85e8-621710f271a2" readonly />
                  <button type="button" id="copyPixKeyBtn" class="btn-secondary">Copiar</button>
                </div>
                <button type="button" id="alreadyPaidBtn" class="btn-primary">Já paguei</button>
              </div>
            </div>
          </div>

          <div id="cashBox" class="checkout-payment-box hidden">
            <input type="text" id="cashChange" placeholder="Troco para quanto?" />
          </div>

          <div id="cardBox" class="checkout-payment-box hidden">
            <select id="installments">
              <option value="1">1x sem juros</option>
              <option value="2">2x sem juros</option>
              <option value="3">3x sem juros</option>
              <option value="4">4x sem juros</option>
              <option value="5">5x sem juros</option>
              <option value="6">6x sem juros</option>
              <option value="7">7x sem juros</option>
              <option value="8">8x com taxa de 16,09%</option>
              <option value="9">9x com taxa de 16,69%</option>
              <option value="10">10x com taxa de 17,39%</option>
              <option value="11">11x com taxa de 18,39%</option>
              <option value="12">12x com taxa de 18,79%</option>
            </select>
            <p id="installmentResult"></p>
          </div>
        </div>

        <div class="checkout-box">
          <h2>4. Observações</h2>
          <textarea id="checkoutNotes" placeholder="Escreva alguma observação sobre seu pedido"></textarea>
          <button type="button" id="finishOrderBtn" class="btn-primary">Enviar pedido no WhatsApp</button>
        </div>
      </section>

      <aside class="checkout-sidebar">
        <div class="checkout-summary-card">
          <h3>Resumo do pedido</h3>
          <div id="checkoutItems"></div>
          <div class="checkout-summary-total">
            <div><span>Subtotal</span><strong id="checkoutSubtotal">R$ 0,00</strong></div>
            <div><span>Total</span><strong id="checkoutTotal">R$ 0,00</strong></div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="produtos.js"></script>
  <script src="app.js"></script>
</body>
</html>
