<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto | Domínio Informática</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="container header-top-content">
        <div class="ship-to" id="shipToText">Enviar para MARIA •</div>

        <div class="header-top-right">
          <button class="notif-btn" type="button" id="openNotificationsBtn">🔔</button>

          <div class="account-menu">
            <button class="account-trigger" id="accountTrigger" type="button">
              <span class="account-avatar" id="accountAvatar">DI</span>
              <span class="account-name" id="accountName">Entrar</span>
            </button>

            <div class="account-dropdown" id="accountDropdown">
              <div class="account-dropdown-header">
                <strong id="dropdownUserName">Visitante</strong>
                <span id="dropdownUserEmail">Faça login para continuar</span>
              </div>

              <a href="login.html" id="profileLink">Meu perfil</a>
              <button type="button" id="myOrdersBtn">Compras</button>
              <button type="button" id="logoutBtn">Sair</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="header-main">
      <div class="container header-main-content">
        <a href="index.html" class="logo-area">
          <img src="logo-dominio.png.png" alt="Domínio Informática" class="site-logo" />
        </a>

        <form class="search-form" id="searchForm">
          <input type="search" id="searchInput" placeholder="Buscar produto..." />
          <button type="submit">Buscar</button>
        </form>

        <a href="checkout.html" class="header-cart" aria-label="Carrinho">
          <span class="header-cart-icon">🛒</span>
          <span class="header-cart-text">Carrinho</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container section">
    <div id="productPage"></div>
  </main>

  <aside class="notification-panel" id="notificationPanel">
    <div class="notification-header">
      <h3>Avisos</h3>
      <button type="button" id="closeNotificationsBtn">✕</button>
    </div>
    <div class="notification-body">
      <div class="notification-item">Confirme seu e-mail para deixar sua conta mais segura.</div>
      <div class="notification-item">Veja novidades e promoções da Domínio Informática.</div>
    </div>
  </aside>

  <aside class="orders-panel" id="ordersPanel">
    <div class="notification-header">
      <h3>Minhas compras</h3>
      <button type="button" id="closeOrdersBtn">✕</button>
    </div>
    <div class="notification-body" id="ordersContent"></div>
  </aside>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
