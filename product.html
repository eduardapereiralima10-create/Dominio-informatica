<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto | Domínio Informática</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="container topbar-content">
        <p>Atendimento rápido pelo WhatsApp • Pix • Cartão • Dinheiro</p>
        <a class="topbar-link" href="login.html">Criar conta / Entrar</a>
      </div>
    </div>

    <div class="container header-main">
      <a href="index.html" class="logo-wrap" aria-label="Ir para a página inicial">
        <div class="logo-mark">DI</div>
        <div class="logo-text">
          <strong>Domínio Informática</strong>
          <span>Informática e automação comercial</span>
        </div>
      </a>

      <form class="search-bar" id="searchForm">
        <input type="text" id="searchInput" placeholder="Busque por produtos, códigos, marcas..." />
        <button type="submit">Buscar</button>
      </form>

      <div class="header-actions">
        <a href="index.html#nao-encontrou" class="header-action">Encomendas</a>
        <button class="header-action cart-btn" id="openCartBtn" type="button">
          Carrinho
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="product-page" id="productPage"></div>
  </main>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-header">
      <h3>Seu carrinho</h3>
      <button class="icon-btn" id="closeCartBtn" type="button">✕</button>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-footer">
      <div class="cart-summary">
        <div>
          <span>Subtotal</span>
          <strong id="cartSubtotal">R$ 0,00</strong>
        </div>
        <div>
          <span>Total</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
      </div>

      <div class="cart-actions">
        <a href="checkout.html" class="btn-primary full">Finalizar compra</a>
        <button class="btn-secondary full" id="clearCartBtn" type="button">Limpar carrinho</button>
      </div>
    </div>
  </aside>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
