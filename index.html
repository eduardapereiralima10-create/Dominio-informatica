<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domínio Informática</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:white;
    display:flex;
    align-items:center;
    padding:10px;
    gap:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    z-index:999;
}

.logo{
    height:45px;
}

.search{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* GRID */
.produtos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    border-radius:10px;
    padding:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:120px;
    object-fit:contain;
}

.preco{
    color:#0a7;
    font-weight:bold;
}

.btn{
    margin-top:5px;
    padding:8px;
    border:none;
    border-radius:8px;
    width:100%;
    cursor:pointer;
}

.carrinho{
    background:#007bff;
    color:white;
}

.whatsapp{
    background:#25D366;
    color:white;
}

/* ENCOMENDA */
.encomenda{
    background:white;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

.encomenda input, .encomenda textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BOT */
.bot{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#007bff;
    color:white;
    padding:12px;
    border-radius:50%;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="logo-dominio.png" class="logo">
<input type="text" class="search" placeholder="Buscar produtos...">
</header>

<div class="produtos" id="produtos"></div>

<!-- ENCOMENDA -->
<div class="encomenda">
<h3>Não encontrou o que você queria?</h3>
<p>Fazemos encomendas!</p>

<input id="produtoDesejado" placeholder="Digite o produto">
<textarea id="obs" placeholder="Observação (opcional)"></textarea>

<button class="btn whatsapp" onclick="encomenda()">Solicitar no WhatsApp</button>
</div>

<!-- BOT -->
<div class="bot" onclick="abrirBot()">💬</div>

<script>
const lista = [
{
nome:"Mouse Bright USB 0106",
preco:15,
img:"mouse-brilhante-1.png"
},
{
nome:"Teclado Fortrek SKL106",
preco:50,
img:"teclado-fortrek-1.png"
},
{
nome:"Mouse Movitec 1000dpi",
preco:18,
img:"mouse-movitec-1.png"
},
{
nome:"Mouse C3Tech MS-35BK",
preco:25,
img:"mouse-c3tech-35bk-1.jpg"
}
]

const div = document.getElementById("produtos")

lista.forEach(p=>{
div.innerHTML += `
<div class="card">
<img src="${p.img}">
<h4>${p.nome}</h4>
<p class="preco">R$ ${p.preco}</p>

<button class="btn carrinho">Adicionar</button>
<button class="btn whatsapp" onclick="comprar('${p.nome}',${p.preco})">WhatsApp</button>
</div>
`
})

function comprar(nome,preco){
let msg = `Olá, quero comprar:\n${nome}\nValor: R$ ${preco}`
window.open(`https://wa.me/5594991683307?text=${encodeURIComponent(msg)}`)
}

function encomenda(){
let prod = document.getElementById("produtoDesejado").value
let obs = document.getElementById("obs").value

let msg = `Olá, quero fazer uma encomenda:\nProduto: ${prod}\nObs: ${obs}`

window.open(`https://wa.me/5594991683307?text=${encodeURIComponent(msg)}`)
}

function abrirBot(){
alert("Dúvidas frequentes:\n\n✔ Fazemos encomenda\n✔ Aceitamos Pix\n✔ Entregamos\n\nSe precisar, fale no WhatsApp")
}
</script>

</body>
</html>
